<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Sky Runner — 2D Platformer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #1a1a2e;
        height: 100%;
        overflow: hidden;
      }
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
      }
      #rotate-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #1a237e;
        color: #e8eaf6;
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 24px;
      }
      #rotate-overlay.visible {
        display: flex;
      }
      #rotate-overlay .phone {
        font-size: 72px;
        animation: tilt 1.6s ease-in-out infinite;
      }
      #rotate-overlay p {
        margin: 0;
        font-size: 22px;
        line-height: 1.4;
      }
      @keyframes tilt {
        0%,
        20% {
          transform: rotate(0deg);
        }
        60%,
        100% {
          transform: rotate(90deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="rotate-overlay">
      <div class="phone">📱</div>
      <p><strong>Rotate your phone</strong><br />Sky Runner is a landscape game.</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
